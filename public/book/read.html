(function(){
  const $=(s)=>document.querySelector(s);
  const esc=s=>String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  // slug -> chapter meta
  const META={}; BOOK.parts.forEach(p=>p.chapters.forEach(c=>META[c.slug]=c));
  const ORDER=BOOK.order.map(o=>o.slug).filter(s=>META[s]);
  const partShort=name=>name.replace(/\s*[—-]\s*.*/,'').trim();

  function slugFromURL(){
    const u=new URL(location.href); let s=u.searchParams.get('ch');
    if(!s||!META[s]) s=ORDER[0];
    return s;
  }
  let cur=slugFromURL();

  // build drawer
  const dlist=$('#dlist');
  BOOK.parts.forEach(p=>{
    const h=document.createElement('div'); h.className='dpart'+(p.appendix?' appendix':''); h.textContent=p.part;
    dlist.appendChild(h);
    p.chapters.forEach(c=>{
      const r=document.createElement('a'); r.className='drow'; r.dataset.slug=c.slug; r.href='read.html?ch='+encodeURIComponent(c.slug);
      r.innerHTML=`<span class="drn">${c.num!=null?String(c.num).padStart(2,'0'):'·'}</span><span class="drt">${esc(c.title)}</span>`;
      r.addEventListener('click',e=>{e.preventDefault();go(c.slug);closeDrawer();});
      dlist.appendChild(r);
    });
  });

  function go(slug,push){
    if(!META[slug]) slug=ORDER[0];
    cur=slug; const c=META[slug];
    $('#frame').src = slug+'/index.html';
    $('#frame').title = c.title;
    $('#c-part').textContent = c.appendix ? 'Appendix · under review' : partShort(c.part);
    $('#c-title').textContent = c.title;
    const i=ORDER.indexOf(slug);
    const numTxt = c.num!=null ? `<span class="c-num">Chapter ${c.num}</span> / ${BOOK.n_main}` : '<span class="c-num">Appendix</span>';
    // put chapter number into the part line's right? keep simple: prepend to part
    $('#c-part').innerHTML = (c.appendix?'Appendix · under review':esc(partShort(c.part))) + ' &nbsp;·&nbsp; ' + numTxt;
    $('#prev').disabled = i<=0;
    $('#next').disabled = i>=ORDER.length-1;
    $('#progbar').style.width = (ORDER.length>1 ? (i/(ORDER.length-1))*100 : 100)+'%';
    // highlight in drawer
    dlist.querySelectorAll('.drow').forEach(r=>r.classList.toggle('cur', r.dataset.slug===slug));
    const url=new URL(location.href); url.searchParams.set('ch',slug);
    history.replaceState({slug},'',url);
    document.title = c.title+' · The Scissors';
    // bring current drawer row into view
    const crow=dlist.querySelector('.drow.cur'); if(crow) crow.scrollIntoView({block:'nearest'});
  }
  function step(d){const i=ORDER.indexOf(cur)+d; if(i>=0&&i<ORDER.length) go(ORDER[i]);}
  $('#prev').onclick=()=>step(-1); $('#next').onclick=()=>step(1);

  // drawer open/close
  const drawer=$('#drawer'), scrim=$('#scrim'), toggle=$('#toc-toggle');
  function openDrawer(){drawer.classList.add('open');scrim.classList.add('open');drawer.setAttribute('aria-hidden','false');toggle.setAttribute('aria-expanded','true');$('#dclose').focus();}
  function closeDrawer(){drawer.classList.remove('open');scrim.classList.remove('open');drawer.setAttribute('aria-hidden','true');toggle.setAttribute('aria-expanded','false');toggle.focus();}
  toggle.onclick=()=>drawer.classList.contains('open')?closeDrawer():openDrawer();
  $('#dclose').onclick=closeDrawer; scrim.onclick=closeDrawer;

  // keyboard (top document only)
  window.addEventListener('keydown',e=>{
    if(e.metaKey||e.ctrlKey||e.altKey) return;
    if(e.key==='ArrowLeft'){step(-1);} else if(e.key==='ArrowRight'){step(1);}
    else if(e.key==='c'||e.key==='C'){drawer.classList.contains('open')?closeDrawer():openDrawer();}
    else if(e.key==='Escape'&&drawer.classList.contains('open')){closeDrawer();}
  });
  window.addEventListener('popstate',()=>{const s=slugFromURL(); if(s!==cur) go(s);});

  go(cur);
})();
</script>
